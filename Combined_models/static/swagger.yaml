info:
  description: Extract event relations from sentences
  title: Event Relation Detection API
  version: 1.0.11
openapi: 3.0.3
paths:
  /extract:
    get:
      parameters:
      - description: Subtask 0 - Sentence Classification model(filter out sentences
          with no event relations)
        enum:
        - roberta_st0_best_model_st1.pt
        in: query
        name: st0
        required: true
        schema:
          default: roberta_st0_best_model_st1.pt
          enum:
          - roberta_st0_best_model_st1.pt
          type: string
      - description: Subtask 2 - Relation Classification model or `off` to skip the
          subtask
        enum:
        - roberta_st1_best_model
        - rebel_st3_model_our_data_gpt_augmented.pth
        - zephyr
        - dpo
        - una
        - solar
        - gpt4
        - 'off'
        in: query
        name: st1
        required: true
        schema:
          default: roberta_st1_best_model
          enum:
          - roberta_st1_best_model
          - rebel_st3_model_our_data_gpt_augmented.pth
          - zephyr
          - dpo
          - una
          - solar
          - gpt4
          - false
          type: string
      - description: Subtask 2 - Relation Extration model (extract the word spans
          referring to events and relations) or `off` to skip the subtask
        enum:
        - roberta_st2_epoch_9
        - rebel_st3_model_our_data_gpt_augmented.pth
        - zephyr
        - dpo
        - una
        - solar
        - gpt4
        - 'off'
        in: query
        name: st2
        required: true
        schema:
          default: roberta_st2_epoch_9
          enum:
          - roberta_st2_epoch_9
          - rebel_st3_model_our_data_gpt_augmented.pth
          - zephyr
          - dpo
          - una
          - solar
          - gpt4
          - false
          type: string
      - description: OpenAI API key (only if you are using GPT-4)
        in: query
        name: api
        required: false
        schema:
          default: null
          type: string
      - description: File on which to perform the event relation extraction. `f` or
          `q` are mandatory
        enum:
        - test.csv
        in: query
        name: f
        required: false
        schema:
          default: test.csv
          enum:
          - test.csv
          type: string
      - description: Sentence to analyse to find the event relation. `f` or `q` are
          mandatory
        in: query
        name: q
        required: false
        schema:
          default: null
          type: string
      responses:
        '200':
          content:
            application/json:
              example:
              - label: cause
                num_rs: 1
                span_pred: 'At Balagangamanahalli panchayat in Dharmapuri , <ARG1>residents
                  of Eechampatti village laid siege to the Nallampalli BDO s office
                  <SIG0>in protest</ARG1></SIG0> against <ARG0>non supply of water</ARG0>
                  . '
                st0_model: roberta
                st1_model: roberta
                st2_model: roberta
                text: 'At Balagangamanahalli panchayat in Dharmapuri , residents of
                  Eechampatti village laid siege to the Nallampalli BDO s office in
                  protest against non supply of water . '
              schema:
                properties:
                  label:
                    description: relation label between "cause", "intend", "enable",
                      "prevent"
                    example: cause
                    type: string
                  num_rs:
                    description: number of found relations
                    example: 1
                    type: integer
                  span_pred:
                    description: the annotated string
                    type: string
                  st0_model:
                    description: model used for sub-task 0
                    type: string
                  st1_model:
                    description: model used for sub-task 1
                    type: string
                  st2_model:
                    description: model used for sub-task 2
                    type: string
                  text:
                    description: the original string
                type: array
        '400':
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                type: object
          description: Bad request
      summary: Perform event relation detection
  /models:
    get:
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  f:
                    type: array
                  st0:
                    type: array
                  st1:
                    type: array
                  st2:
                    type: array
                type: array
      summary: Return the list of available models for each sub-task
